 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>My Website</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="" type="image/x-icon">
</head>
<body>

    <div id="darkenedSite"></div>

    <div id="header">
        <h2>this is the header</h2>
        <button id="newTableButton">New Table</button>
        <button id="newSlotButton">New Slot</button>
    </div>

    <div id="adminCalendarSettingsPanel">
        <div>
            <h3>Test</h3>
        </div>
        <div>
            start date
            <input class="inputStyle1" id="startDate" type="date" value="2024-01-01">
        </div>
        <div>   
            end date
            <input class="inputStyle1" id="endDate" type="date" value="2024-12-31">
        </div>
        <div>
            earliest start time
            <input class="inputStyle1" id="startTime" type="time" value="05:30">
        </div>
        <div>
            latest end time
            <input class="inputStyle1" id="endTime" type="time" value="10:20" >
        </div>

        <button id="submitCalendarSettingsButton">
            submit
        </button>
    </div>
    <div id="adminSlotCreationPanel">
        <div>
            <h3>Test</h3>
        </div>
        <div>
            day
            <input class="inputStyle1" id="dayOfSlot" type="date" value="2026-06-29">
        </div>
        <div>
            start time
            <input class="inputStyle1" id="startTimeSlot" type="time" value="09:30">
        </div>
        <div>
            end time
            <input class="inputStyle1" id="endTimeSlot" type="time" value="10:20" >
        </div>
        <button id="submitSlotCreationButton">
            submit
        </button>
    </div>
    <div id="SlotAndModuleEditPanel">
        <button class="closeModulesWindow"></button>
        <div id="adminSlotPanel">
            <div>
                day
                <input class="inputStyle1" id="dayOfSlotPanel" type="date" value="2026-06-29">
            </div>
            <div>
                start time
                <input class="inputStyle1" id="startTimeSlotPanel" type="time" value="09:30">
            </div>
            <div>
                end time
                <input class="inputStyle1" id="endTimeSlotPanel" type="time" value="10:20" >
            </div>
            <button id="addModuleButton">Add Module</button>
            <button id ="saveSlotAndModuleSettings">Save</button>
        </div>
        <div id="adminModulePanel"></div>
    </div>
    <div id="errorPanel">
    </div>
    <div id="mainGrid">
        <div id="mainCalendar">
            <div id="calendarMonth">
                <div></div>
            </div>
            <div id="calendarDateRow">
                <div class="calendarDaySlot"></div>
                <div class="calendarDaySlot"></div>
                <div class="calendarDaySlot"></div>
                <div class="calendarDaySlot"></div>
                <div class="calendarDaySlot"></div>
                <div class="calendarDaySlot"></div>
                <div class="calendarDaySlot"></div>
            </div>
            <div id="calendarTimeColumn">

            </div>
            <div id="calendarColumns">
                <div class="calendarColumn"></div>  
                <div class="calendarColumn"></div>
                <div class="calendarColumn"></div>
                <div class="calendarColumn"></div>
                <div class="calendarColumn"></div>
                <div class="calendarColumn"></div>
                <div class="calendarColumn"></div>
            </div>
        </div>
    </div>
    <script src="admin.js"></script>
</body>
</html>
