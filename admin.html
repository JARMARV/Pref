 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>My Website</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="" type="image/x-icon">
</head>
<body>

    <div id="darkenedSite"></div>

    <div id="header">
        <h2>this is the header</h2>
        <button id="newTableButton">New Table</button>
        <button id="newModuleButton">New Module</button>
    </div>

    <div id="adminCalendarSettingsPanel">
        <div>
            <h3>Test</h3>
        </div>
        <div>
            start date
            <input id="startDate" type="date" value="2024-01-01">
        </div>
        <div>   
            end date
            <input id="endDate" type="date" value="2024-12-31">
        </div>
        <div>
            earliest start time
            <input id="startTime" type="time" value="05:30">
        </div>
        <div>
            latest end time
            <input id="endTime" type="time" value="10:20" >
        </div>

        <button id="submitCalendarSettingsButton">
            submit
        </button>
    </div>

    <div id="adminModuleCreationPanel">
        <div>
            <h3>Test</h3>
        </div>
        <div>
            day
            <input id="dayOfModule" type="date" value="2024-01-01">
        </div>
        <div>
            start time
            <input id="startTimeModule" type="time" value="09:30">
        </div>
        <div>
            end time
            <input id="endTimeModule" type="time" value="10:20" >
        </div>
        <div>
            location
            <input id="locationInfoModule" type="text" value="101">
        </div>
        <div>
            additional information
            <input id="moduleInfo" type="text" value="no additional information">
        </div>
        <button id="submitModuleCreationButton">
            submit
        </button>
    </div>

    <div id="mainGrid">
        <div id="mainCalendar">
            <div id="calendarMonth">
                <div></div>
            </div>
            <div id="calendarDateRow">
                <div class="calendarDaySlot"></div>
                <div class="calendarDaySlot"></div>
                <div class="calendarDaySlot"></div>
                <div class="calendarDaySlot"></div>
                <div class="calendarDaySlot"></div>
                <div class="calendarDaySlot"></div>
                <div class="calendarDaySlot"></div>
            </div>
            <div id="calendarTimeColumn">

            </div>
            <div id="calendarColumns">
                <div class="calendarColumn">
                    <div class="CalendarModule"> </div>
                </div>
                <div class="calendarColumn"></div>
                <div class="calendarColumn"></div>
                <div class="calendarColumn"></div>
                <div class="calendarColumn"></div>
                <div class="calendarColumn"></div>
                <div class="calendarColumn"></div>
            </div>
        </div>
    </div>
    <script src="admin.js"></script>
</body>
</html>
