<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Pref Login</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="" type="image/x-icon">
</head>
<body>
    <div id="header">
        <h2>this is the header</h2>
        <button id="openLoginPanelButton">Login</button>
    </div>
    <div id="darkenedSite"></div>
    <div id="mainGrid">
        <div id="loginPanel">
            <div id="loginTitle">
                <h3>Login</h3>
            </div>
            <div id="userName">
                Username
                <input type="text" >
            </div>
            <div id="school">
                School ID
                <input type="text" >
            </div>
            <div id="password">
                Password
                <input type="password" >
            </div>
            <div id="loginButton">
                <button id="loginButton!">
                    Login
                </button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
